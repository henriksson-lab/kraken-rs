# Explicit Rust-to-original function mapping for code-complexity-comparator.
#
# The original Kraken 2 sources live under kraken2/. Path and line pins are
# used where names are overloaded (for example multiple main, reset, clz, and
# ProcessSequence functions). Keep this file in sync when translating more
# original functions so ccc-rs does not fall back to fragile fingerprint pairs.

